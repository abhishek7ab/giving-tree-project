<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Giving Tree</title>
    
    <link rel="stylesheet" href="/assets/style/base.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --admin-dark: #0f172a;
            --admin-accent: #1abc9c;
            --admin-bg: #f1f5f9;
        }

        body { 
            background: var(--admin-bg); 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            color: #334155;
        }

        /* --- PREMIER HEADER --- */
        .admin-header-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 100px 0 160px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background pattern */
        .admin-header-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .admin-header-bg h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- GLASS STAT CARDS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: -80px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .icon-items { background: #e0f2fe; color: #0ea5e9; }
        .icon-users { background: #dcfce7; color: #10b981; }
        .icon-health { background: #fef3c7; color: #f59e0b; }

        .stat-info span { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-info h2 { font-size: 32px; margin: 0; color: #1e293b; font-weight: 700; }

        /* --- MODERN TABLE STYLING --- */
        .admin-section {
            margin-top: 60px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .section-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .admin-table th {
            background: #f8fafc;
            padding: 18px 25px;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0;
        }

        .admin-table td {
            padding: 20px 25px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            vertical-align: middle;
        }

        .admin-table tr:last-child td { border-bottom: none; }

        /* Avatars & Details */
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 35px; height: 35px; border-radius: 10px;
            background: #f1f5f9; display: flex; align-items: center;
            justify-content: center; color: #94a3b8; font-weight: 700;
        }

        /* New Badges */
        .badge-pill {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-admin { background: #fee2e2; color: #ef4444; }
        .badge-user { background: #f1f5f9; color: #475569; }

        .btn-delete-small {
            background: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-delete-small:hover {
            background: #e11d48;
            color: white;
        }
    </style>
</head>
<body>

    <div class="navbar" style="background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: none;">
        <div class="logo"><i class="fas fa-shield-halved" style="color:var(--admin-accent)"></i> GIVING TREE <span style="font-weight:300; opacity:0.5; margin-left:10px;">CORE</span></div>
        <nav class="nav-links">
            <a href="/" style="font-size: 11px; opacity:0.7">Back to Frontend</a>
            <div class="user-section" style="border-left-color: rgba(255,255,255,0.1)">
                <a href="/logout" class="logout-btn" style="border-radius: 12px;">Logout</a>
            </div>
        </nav>
    </div>

    <header class="admin-header-bg">
        <div class="container">
            <h1>System Oversight</h1>
            <p style="opacity:0.6; font-weight:300; font-size:18px;">Global management dashboard for community and users.</p>
        </div>
    </header>

    <div class="container">
        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon icon-items"><i class="fas fa-box"></i></div>
                <div class="stat-info">
                    <span>Active Items</span>
                    <h2 id="countItems">...</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-users"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <span>Registered Users</span>
                    <h2 id="countUsers">...</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-health"><i class="fas fa-heart-pulse"></i></div>
                <div class="stat-info">
                    <span>API Health</span>
                    <h2 style="color: #10b981;">100%</h2>
                </div>
            </div>
        </div>

        <!-- USERS -->
        <div class="admin-section">
            <div class="section-header">
                <h3><i class="fas fa-user-group"></i> Member Management</h3>
            </div>
            <div class="table-card">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>User Details</th>
                            <th>Email Address</th>
                            <th>Permission</th>
                        </tr>
                    </thead>
                    <tbody id="userList">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ITEMS -->
        <div class="admin-section" style="margin-bottom: 100px;">
            <div class="section-header">
                <h3><i class="fas fa-boxes-stacked"></i> Community Inventory</h3>
            </div>
            <div class="table-card">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Ref ID</th>
                            <th>Item Name</th>
                            <th>Current Location</th>
                            <th>Management</th>
                        </tr>
                    </thead>
                    <tbody id="itemList">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/admin/data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('countItems').innerText = data.stats.totalItems;
                document.getElementById('countUsers').innerText = data.stats.totalUsers;

                let userHTML = "";
                data.users.forEach(u => {
                    const initials = u.name.split(' ').map(n => n[0]).join('');
                    userHTML += `
                    <tr>
                        <td>
                            <div class="user-info">
                                <div class="avatar">${initials}</div>
                                <strong>${u.name}</strong>
                            </div>
                        </td>
                        <td><span style="color:#64748b">${u.email}</span></td>
                        <td><span class="badge-pill ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role}</span></td>
                    </tr>`;
                });
                document.getElementById('userList').innerHTML = userHTML;

                let itemHTML = "";
                data.items.forEach(i => {
                    itemHTML += `
                    <tr>
                        <td><code style="background:#f1f5f9; padding:4px 8px; border-radius:6px; font-size:12px; color:#475569">#${i.id}</code></td>
                        <td><strong>${i.title}</strong></td>
                        <td><i class="fas fa-location-dot" style="color:#1abc9c; font-size:12px;"></i> ${i.location}</td>
                        <td>
// Add a small confirmation so you don't delete items by mistake
                        <form action="/admin/delete-item" method="POST" onsubmit="return confirm('Are you sure you want to permanently remove this item from the community?')">                                <input type="hidden" name="id" value="${i.id}">
                                <button type="submit" class="btn-delete-small">Delete</button>
                            </form>
                        </td>
                    </tr>`;
                });
                document.getElementById('itemList').innerHTML = itemHTML;
            });
    </script>
</body>
</html>
