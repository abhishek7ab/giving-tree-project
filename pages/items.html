<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Catalog | Giving Tree</title>

    <link rel="stylesheet" href="/assets/style/base.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { background: #f8fafc; margin: 0; }

        .items-header {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)),
                        url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3');
            background-size: cover;
            background-position: center;
            padding: 100px 0 180px;
            color: white;
            text-align: center;
        }

        .search-pill {
            max-width: 800px;
            margin: -50px auto 40px;
            background: white;
            padding: 10px;
            border-radius: 100px;
            display: flex;
        }

        .search-pill input {
            flex: 1;
            border: none;
            padding: 10px;
            outline: none;
        }

        .btn-search {
            background: #1abc9c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .pro-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .img-box {
            height: 200px;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
        }

        .btn-req {
            width: 100%;
            padding: 12px;
            background: #1abc9c;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header class="items-header">
    <h1>Community Catalog</h1>
    <p>Find items shared by neighbors</p>
</header>

<div class="search-pill">
    <input type="text" id="searchInput" placeholder="Search items...">
    <button class="btn-search" onclick="searchItems()">Search</button>
</div>

<div class="items-grid" id="itemsGrid"></div>

<script>
    const BACKEND_URL = "https://giving-tree-backend.onrender.com";

    function loadItems(query = '') {
fetch(`${BACKEND_URL}/api/items/data?search=${query}`)
        .then(res => res.json())
        .then(data => {
            let html = "";

            if (!data.items || data.items.length === 0) {
                html = "<h2 style='text-align:center;'>No items found</h2>";
            } else {
                data.items.forEach(i => {

                    const imageUrl = i.image
                        ? i.image
                        : "https://dummyimage.com/400x300/cccccc/000000&text=No+Image";

                    html += `
                    <div class="pro-card">
                        <div class="img-box">
                            <img src="${imageUrl}" alt="Item">
                        </div>
                        <div class="card-body">
                            <h3>${i.title}</h3>
                            <p>${i.description}</p>
                            <p>📍 ${i.location}</p>
                            <button class="btn-req" onclick="requestItem(${i.id})">
                                Request Item
                            </button>
                        </div>
                    </div>
                    `;
                });
            }

            document.getElementById("itemsGrid").innerHTML = html;
        })
        .catch(err => {
            console.error("ERROR:", err);
        });
    }

    function searchItems() {
        const val = document.getElementById("searchInput").value;
        loadItems(val);
    }

    // 🔥 NEW FUNCTION (THIS WAS MISSING)
function requestItem(itemId) {
    fetch(`${BACKEND_URL}/request-item`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({ item_id: itemId })
    })
    .then(res => {
        if (!res.ok) throw new Error("Request failed");
        return res.text();
    })
    .then(data => {
        alert("Request sent successfully ✅");
        console.log(data);
    })
    .catch(err => {
        console.error(err);
        alert("You must be logged in or request failed ❌");
    });
}

    loadItems();
</script>

</body>
</html>
