<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share an Item | Giving Tree</title>

    <link rel="stylesheet" href="/assets/style/base.css">
    <link rel="stylesheet" href="/assets/style/component.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Poppins', sans-serif;
        }

        .main-form-card {
            background: white;
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #1abc9c;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 🔥 Upload UI */
        .upload-box {
            border: 2px dashed #1abc9c;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
        }

        .upload-box:hover {
            background: #ecfeff;
        }

        .upload-content i {
            font-size: 30px;
            color: #1abc9c;
        }

        .upload-content p {
            margin-top: 10px;
            font-weight: 600;
        }

        .preview-container {
            position: relative;
            margin-top: 15px;
        }

        .preview-container img {
            width: 100%;
            border-radius: 10px;
        }

        #removeImage {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 5px 10px;
        }
    </style>
</head>

<body>

<div class="navbar" style="background:#1abc9c; padding:20px; color:white; text-align:center; font-weight:800;">
    🌳 GIVING TREE
</div>

<div class="main-form-card">

    <div class="post-card">

        <h2>✨ Share an Item</h2>
        <p class="subtitle">Help your community by sharing something useful</p>

        <form action="https://giving-tree-backend.onrender.com/post-item" method="POST" enctype="multipart/form-data">

            <div class="input-group">
                <label>Item Name</label>
                <input type="text" name="title" required>
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea name="description" required></textarea>
            </div>

            <div class="input-group">
                <label>Location</label>
                <input type="text" name="location" required>
            </div>

            <!-- 🔥 NEW UPLOAD SYSTEM -->
            <div class="input-group">
                <label>Upload Image</label>

                <div class="upload-box" id="uploadBox">
                    <input type="file" name="image" id="imageInput" hidden required>

                    <div class="upload-content">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click or Drag & Drop Image</p>
                    </div>
                </div>

                <!-- Preview -->
                <div class="preview-container" id="previewContainer" style="display:none;">
                    <img id="previewImage">
                    <button type="button" id="removeImage">✖</button>
                </div>
            </div>

            <button type="submit" class="btn-submit">🚀 Publish Item</button>

        </form>

        <p style="text-align:center; margin-top:20px;">
            <a href="/items">← Back to Items</a>
        </p>

    </div>

</div>

<!-- 🔥 SCRIPT -->
<script>
const uploadBox = document.getElementById("uploadBox");
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("previewImage");
const previewContainer = document.getElementById("previewContainer");
const removeBtn = document.getElementById("removeImage");

// Click
uploadBox.addEventListener("click", () => imageInput.click());

// Change
imageInput.addEventListener("change", handleFile);

// Drag
uploadBox.addEventListener("dragover", e => {
    e.preventDefault();
    uploadBox.style.background = "#ecfeff";
});

uploadBox.addEventListener("dragleave", () => {
    uploadBox.style.background = "";
});

uploadBox.addEventListener("drop", e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    imageInput.files = e.dataTransfer.files;
    handleFile({ target: { files: [file] } });
});

// Handle file
function handleFile(e) {
    const file = e.target.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function (event) {
            preview.src = event.target.result;
            previewContainer.style.display = "block";
        };

        reader.readAsDataURL(file);
    }
}

// Remove
removeBtn.addEventListener("click", () => {
    preview.src = "";
    previewContainer.style.display = "none";
    imageInput.value = "";
});
</script>

</body>
</html>
