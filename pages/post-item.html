<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share an Item | Giving Tree</title>
    <link rel="stylesheet" href="/assets/style/base.css">
    <link rel="stylesheet" href="/assets/style/component.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    body { 
        background-color: #f1f5f9; 
        background-image: radial-gradient(at 0% 0%, rgba(26, 188, 156, 0.05) 0px, transparent 50%),
                          radial-gradient(at 100% 100%, rgba(26, 188, 156, 0.05) 0px, transparent 50%);
        margin: 0; padding: 0; text-align: left; 
    }
    .post-header-clean {
        background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.95)),
                    url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=1600&q=80');
        background-size: cover; background-position: center; background-attachment: fixed;
        padding: 100px 0 160px; color: white; text-align: center; position: relative;
    }
    .post-header-clean::after {
        content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
        background: linear-gradient(to top, #f1f5f9, transparent);
    }
    .page-wrapper {
        max-width: 1100px; margin: -100px auto 100px; padding: 0 20px;
        display: grid; grid-template-columns: 1.8fr 1fr;
        gap: 30px; position: relative; z-index: 10;
    }
    .main-form-card {
        background: white; padding: 50px; border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        border: 1px solid #e2e8f0;
    }
    .section-label { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 35px; display: flex; align-items: center; gap: 12px; }
    .section-label i { color: #1abc9c; }
    .input-group { margin-bottom: 25px; width: 100%; display: block; }
    .input-group label {
        display: block; font-size: 13px; font-weight: 700; color: #64748b;
        text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .modern-input {
        width: 100%; padding: 15px 20px; border-radius: 14px;
        border: 2px solid #f1f5f9; background: #f8fafc;
        font-family: 'Poppins'; font-size: 14px; color: #1e293b;
        box-sizing: border-box; transition: 0.3s; display: block;
    }
    .modern-input:focus {
        outline: none; border-color: #1abc9c; background: white;
        box-shadow: 0 0 0 4px rgba(26, 188, 156, 0.1);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
    .upload-area {
        background: #f8fafc; border: 2px dashed #cbd5e1; padding: 40px;
        border-radius: 20px; text-align: center; transition: 0.3s;
        cursor: pointer; position: relative;
    }
    .upload-area:hover { border-color: #1abc9c; background: #f0fdfa; }
    .upload-area i { font-size: 32px; color: #94a3b8; margin-bottom: 10px; }
    #imageInput { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .info-sidebar { background: white; border-radius: 32px; padding: 35px; border-left: 6px solid #1abc9c; box-shadow: 0 10px 30px rgba(0,0,0,0.03); height: fit-content; }
    .tip-card { background: #f8fafc; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
    .tip-card i { font-size: 24px; color: #1abc9c; margin-bottom: 10px; display: block; }
    .tip-card h4 { margin: 0; font-size: 14px; color: #1e293b; }
    .tip-card p { margin: 5px 0 0 0; font-size: 12px; color: #64748b; line-height: 1.5; }
    .btn-submit-premium {
        width: 100%; padding: 18px; background: #1abc9c; color: white;
        border: none; border-radius: 16px; font-weight: 800; font-size: 15px;
        text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
        transition: 0.3s; margin-top: 20px; box-shadow: 0 10px 20px rgba(26, 188, 156, 0.2);
    }
    .btn-submit-premium:hover { background: #16a085; transform: translateY(-3px); }
</style>
</head>
<body>

<div class="navbar">
    <div class="logo">🌳 GIVING TREE</div>
    <nav class="nav-links" id="navLinks"></nav>
</div>

<header class="post-header-clean">
    <div class="container">
        <h1 style="color:white; font-size: 42px; margin: 0; letter-spacing: -1.5px; font-weight: 800;">Share an Item</h1>
        <p style="opacity: 0.7; font-weight: 300; font-size: 18px; margin-top: 10px;">Give your unused items a second life in your neighborhood.</p>
    </div>
</header>

<div class="page-wrapper">
    <main class="main-form-card">
        <div class="section-label"><i class="fas fa-edit"></i> Item Details</div>
        
        <!-- FIXED: Single Form Tag with correct encoding -->
        <form id="postItemForm" action="/post-item" method="POST" enctype="multipart/form-data">
            
            <div class="input-group">
                <label>Item Name</label>
                <input type="text" name="title" class="modern-input" placeholder="e.g. Wooden Coffee Table" required>
            </div>

            <div class="input-group">
                <label>Detailed Description</label>
                <textarea name="description" class="modern-input" rows="4" placeholder="Mention size, condition..." required></textarea>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>City / Location</label>
                    <input type="text" name="location" class="modern-input" placeholder="e.g. Pune" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select name="category" class="modern-input">
                        <option value="Furniture">Furniture</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Books">Books</option>
                        <option value="Kitchen">Kitchen</option>
                        <option value="Other" selected>Other</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Upload Photo</label>
                <div class="upload-area">
                    <i class="fas fa-camera"></i>
                    <p id="fileName" style="margin: 10px 0 0 0; font-weight: 600; color: #64748b;">Click to select a clear image</p>
                    <input type="file" name="image" id="imageInput" accept="image/*" required>
                </div>
            </div>

            <button type="submit" class="btn-submit-premium" id="submitBtn">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Publish Item
            </button>
        </form>
    </main>

    <aside class="info-sidebar">
        <h3 style="margin-top:0; color:#1e293b; font-size: 20px; font-weight: 800;">Quick Tips</h3>
        <div class="tip-card"><i class="fas fa-check-circle"></i><h4>Be Honest</h4><p>Note scratches or damage.</p></div>
        <div class="tip-card"><i class="fas fa-image"></i><h4>Bright Photos</h4><p>Daylight photos get 2x more requests.</p></div>
    </aside>
</div>

<script>
document.getElementById('imageInput').onchange = function() {
    if (this.files && this.files[0]) {
        document.getElementById('fileName').innerHTML = `<i class="fas fa-check-circle"></i> Selected: ${this.files[0].name}`;
    }
};

fetch('/api/user')
.then(res => res.json())
.then(data => {
    const nav = document.getElementById('navLinks');
    if (data.loggedIn) {
        nav.innerHTML = `<a href="/">Home</a><a href="/items">Browse</a><a href="/requests">Requests</a><a href="/logout">Logout</a>`;
    } else {
        window.location.href = '/login';
    }
});

document.getElementById('postItemForm').onsubmit = function() {
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Publishing...';
    btn.style.opacity = '0.8';
    btn.style.pointerEvents = 'none';
};
</script>
</body>
</html>
