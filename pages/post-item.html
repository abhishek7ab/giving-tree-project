<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share an Item | Giving Tree</title>
    <link rel="stylesheet" href="/assets/style/base.css">
    <link rel="stylesheet" href="/assets/style/component.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Poppins', sans-serif; }
        .main-form-card { background: white; max-width: 600px; margin: 50px auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #1e293b; }
        .modern-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #1abc9c; color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="navbar" style="background:#1abc9c; padding: 20px; color:white; text-align:center; font-weight:800;">
    🌳 GIVING TREE
</div>

<div class="main-form-card">
    <h2 style="text-align:center; color:#2c3e50;">Share an Item</h2>
    
    <!-- ONLY ONE FORM TAG HERE -->
    <form action="https://giving-tree-backend.onrender.com/post-item" method="POST" enctype="multipart/form-data">
        
        <div class="input-group">
            <label>Item Name</label>
            <input type="text" name="title" class="modern-input" placeholder="e.g. Wooden Table" required>
        </div>

        <div class="input-group">
            <label>Description</label>
            <textarea name="description" class="modern-input" rows="4" placeholder="Tell us about it..." required></textarea>
        </div>

        <div class="input-group">
            <label>City / Location</label>
            <input type="text" name="location" class="modern-input" placeholder="e.g. Mumbai" required>
        </div>

        <div class="input-group">
            <label>Upload Photo</label>
            <input type="file" name="image" accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit">Publish Item</button>
    </form>
    
    <p style="text-align:center; margin-top:20px;"><a href="/items" style="color:#7f8c8d; text-decoration:none;">← Back to Items</a></p>
</div>

</body>
</html>
